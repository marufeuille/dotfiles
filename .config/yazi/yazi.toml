# テキスト系ファイルのプレビューをbatに差し替え
[[plugin.prepend_previewers]]
mime = "text/*"
run = 'piper -- bat -p --color=always "$1"'

# 特定の拡張子だけbatにしたい場合
[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- bat -p --color=always --language=markdown "$1"'

[[plugin.prepend_previewers]]
url = "*.csv"
run = 'piper -- bat -p --color=always "$1"'

[mgr]
ratio = [ 1, 3, 4 ]

